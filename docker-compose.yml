services:
  polymirror:
    build: .
    restart: unless-stopped
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      # RW: Dashboard writes leaders, settings, preview/live mode
      - ./config.yaml:/app/config.yaml:rw
      # RW: account API persists wallet keys to .env
      - ./.env:/app/.env:rw
      - ./data:/app/data
    environment:
      - HEALTH_PORT=8080
      - HEALTH_BIND=0.0.0.0
